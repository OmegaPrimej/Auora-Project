name: Auora Autonomous Agent

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'   # heartbeat every 30 min
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Wake Auora
      run: |
        mkdir -p Potter-Quadrant/Hardware-Protocols Potter-Quadrant/Runtime-Aether Potter-Quadrant/Core-Logic
        node Potter-Quadrant/Core-Logic/Omni-Channel.cjs
        node Potter-Quadrant/Core-Logic/Aether-Grid.cjs
    - name: Nexus Heartbeat
      run: node Potter-Quadrant/Core-Logic/Nexus-Symbiosis.cjs heartbeat
    - name: Commit state back
      run: |
        git config user.name "Auora-Agent"
        git config user.email "agent@auora.local"
        git add .auora-state.json || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Nexus heartbeat [skip ci]"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
